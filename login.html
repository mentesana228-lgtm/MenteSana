<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Mente Sana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo-brand">
      <img src="logo.png" alt="Logo de Mente Sana" class="logo-img" width="52" height="52" loading="lazy">
      <span>MENTE SANA</span>
    </a>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="login.html">Iniciar sesión</a>
      <a href="registro.html">Registrarme</a>
      <a href="evaluacion-anonima.html">Test anónimo</a>
      <a href="privacidad.html">Privacidad</a>
      <button id="themeToggle" class="theme-nav" type="button" aria-label="Cambiar tema"></button>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card reveal">
      <h1>Iniciar sesión</h1>
      <p>Accede a tu espacio personal de bienestar.</p>

      <form class="auth-form" id="formLogin" novalidate>
        <div class="auth-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@correo.com" required autocomplete="email">
        </div>

        <div class="auth-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
        </div>

        <p class="mensaje-form" id="mensajeLogin" aria-live="polite"></p>

        <button type="submit" class="btn principal">Entrar</button>
      </form>

      <div class="btn-row" style="margin-top:14px">
        <a href="registro.html" class="btn secundario">¿No tienes cuenta? Regístrate</a>
        <a href="evaluacion-anonima.html" class="btn ghost">Test anónimo sin registro</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
