<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta - Mente Sana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo-brand solo-logo">
      <img src="logo.png" alt="Logo de Mente Sana" class="logo-img" width="52" height="52" loading="lazy">
    </a>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="login.html">Iniciar sesión</a>
      <a href="registro.html">Registrarme</a>
      <a href="evaluacion-anonima.html">Test anónimo</a>
      <a href="privacidad.html">Privacidad</a>
      <button id="themeToggle" class="theme-nav" type="button" aria-label="Cambiar tema"></button>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card reveal">
      <h1>Crear cuenta</h1>
      <p>Regístrate con tu correo institucional y usa un alias para cuidar tu privacidad dentro de la plataforma.</p>

      <form id="registroForm" class="auth-form">
        <div class="auth-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo" required>
        </div>

        <div class="form-row">
          <div class="auth-group">
            <label for="correo">Correo institucional</label>
            <input type="email" id="correo" placeholder="ejemplo@universidad.edu.co" required>
          </div>

          <div class="auth-group">
            <label for="alias">Alias o seudónimo</label>
            <input type="text" id="alias" placeholder="Ej. EstudianteLuz" required>
          </div>
        </div>

        <div class="auth-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
        </div>

        <button type="submit" class="btn principal">Crear cuenta</button>
        <p id="registroMensaje" class="mensaje-form"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
